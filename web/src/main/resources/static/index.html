<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket STOMP Test</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #dadada 0%, #565656 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 600px;
        padding: 40px;
      }
      h1 {
        color: #333;
        margin-bottom: 30px;
        text-align: center;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: bold;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        font-family: Arial, sans-serif;
      }
      textarea {
        resize: vertical;
        min-height: 80px;
      }
      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 30px;
      }
      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .btn-connect {
        background: #667eea;
        color: white;
      }
      .btn-connect:hover {
        background: #5568d3;
      }
      .btn-disconnect {
        background: #ff6b6b;
        color: white;
      }
      .btn-disconnect:hover {
        background: #ee5a52;
      }
      .btn-send {
        background: #51cf66;
        color: white;
      }
      .btn-send:hover {
        background: #40c057;
      }
      .btn-send:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .status {
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-weight: bold;
        text-align: center;
      }
      .status.disconnected {
        background: #ffe0e0;
        color: #d32f2f;
      }
      .status.connecting {
        background: #fff3cd;
        color: #856404;
      }
      .status.connected {
        background: #d4edda;
        color: #155724;
      }
      .messages {
        background: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 5px;
        height: 300px;
        overflow-y: auto;
        padding: 15px;
        margin-top: 20px;
      }
      .message {
        padding: 10px;
        margin-bottom: 10px;
        border-left: 4px solid #667eea;
        background: white;
        border-radius: 3px;
      }
      .message.sent {
        border-left-color: #51cf66;
      }
      .message.received {
        border-left-color: #667eea;
      }
      .message.error {
        border-left-color: #ff6b6b;
        color: #d32f2f;
      }
      .timestamp {
        font-size: 12px;
        color: #999;
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>WebSocket STOMP Test</h1>

      <div id="status" class="status disconnected">Disconnected</div>

      <div class="form-group">
        <label for="token">JWT Token:</label>
        <input type="text" id="token" placeholder="Enter your JWT token" />
      </div>

      <div class="form-group">
        <label for="chatId">Chat ID:</label>
        <input
          type="number"
          id="chatId"
          placeholder="Enter chat ID"
          value="1"
        />
      </div>

      <div class="button-group">
        <button class="btn-connect" onclick="connect()">Connect</button>
        <button class="btn-disconnect" onclick="disconnect()">
          Disconnect
        </button>
      </div>

      <div class="form-group">
        <label for="message">Message:</label>
        <textarea id="message" placeholder="Enter your message"></textarea>
      </div>

      <button class="btn-send" onclick="sendMessage()" id="sendBtn" disabled>
        Send Message
      </button>

      <div class="messages" id="messages"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="stomp-test.js"></script>
  </body>
</html>
